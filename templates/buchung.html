{% extends "base.html" %}

{% block title %}Koch-Event buchen | Kochstudio Darmstadt{% endblock %}

{% block content %}
<main>
  <section class="section">
    <div class="form-wrap">
      <div class="form-head">
        <h1>Koch-Event buchen</h1>
        <p>Welches Koch-Event möchten Sie buchen?</p>
      </div>

      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <form class="card-form" method="POST" action="{{ url_for('booking.submit_booking') }}">
        <div class="form-row">
          <div class="field">
            <label for="event_type_code">Event-Typ <span class="required">*</span></label>
            <select id="event_type_code" name="event_type_code" required>
              <option value="">Bitte wählen</option>
              <option value="company_event">Firmenveranstaltung</option>
              <option value="cooking_experience">Koch-Erlebnisparty</option>
              <option value="kids_event">Kinderveranstaltung</option>
              <option value="other">Sonstiges</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="field">
            <label for="name">Name <span class="required">*</span></label>
            <input id="name" name="name" type="text" required>
          </div>
        </div>

        <div class="form-row cols-2">
          <div class="field">
            <label for="email">E-Mail-Adresse <span class="required">*</span></label>
            <input id="email" name="email" type="email" required>
          </div>
          <div class="field">
            <label for="phone">Telefonnummer</label>
            <input id="phone" name="phone" type="tel">
          </div>
        </div>

        <div class="form-row">
          <div class="field">
            <label for="participant_count">Voraussichtliche Teilnehmeranzahl</label>
            <input id="participant_count" name="participant_count" type="number" min="1">
          </div>
        </div>

        <div class="form-row cols-3">
          <div class="field">
            <label for="first_choice_date">1. Wahl : Datum</label>
            <input id="first_choice_date" name="first_choice_date" type="date">
          </div>
          <div class="field">
            <label for="first_choice_time">1. Wahl : Zeit</label>
            <input id="first_choice_time" name="first_choice_time" type="time">
          </div>
          <div class="field">
            <label for="first_choice_course">1. Wahl bevorzugter Kochkurs <span class="required">*</span></label>
            <select id="first_choice_course" name="first_choice_course_id" required>
              <option value="">Bitte wählen</option>
              {% for course in cooking_courses %}
                <option value="{{ course.id }}">{{ course.name_de }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-row cols-3">
          <div class="field">
            <label for="second_choice_date">2. Wahl : Datum</label>
            <input id="second_choice_date" name="second_choice_date" type="date">
          </div>
          <div class="field">
            <label for="second_choice_time">2. Wahl : Zeit</label>
            <input id="second_choice_time" name="second_choice_time" type="time">
          </div>
          <div class="field">
            <label for="second_choice_course">2. Wahl bevorzugter Kochkurs <span class="required">*</span></label>
            <select id="second_choice_course" name="second_choice_course_id" required>
              <option value="">Bitte wählen</option>
              {% for course in cooking_courses %}
                <option value="{{ course.id }}">{{ course.name_de }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="field">
            <label for="note">Anmerkung/Mitteilung</label>
            <textarea id="note" name="note"></textarea>
            <div class="field-tools">
              <button
                id="improveNoteButton"
                class="btn btn-secondary btn-small"
                type="button"
                data-url="{{ url_for('booking.improve_note_text') }}"
              >
                  Anmerkung verbessern
              </button>
              <span id="noteImproveStatus" class="field-status" aria-live="polite"></span>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary btn-block">ANFRAGE SENDEN</button>
        </div>
      </form>
    </div>
  </section>
</main>
{% endblock %}
